name: Generate Metrics

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Stats overview
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          committer_token: ${{ secrets.GITHUB_TOKEN }}
          committer_branch: output
          output_action: commit
          filename: metrics.base.svg
          base: header, repositories
          config_timezone: Africa/Casablanca
          config_display: large
          extras_css: |
            :root {
              --color-text: #1C1917;
              --color-link: #15803D;
              --color-border: #D6D3D1;
              --color-background: #F0EEE6;
              --color-background-overlay: #F0EEE6;
            }

      - name: Top languages
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          committer_token: ${{ secrets.GITHUB_TOKEN }}
          committer_branch: output
          output_action: commit
          filename: metrics.langs.svg
          base: ""
          plugin_languages: yes
          plugin_languages_limit: 8
          plugin_languages_details: percentage
          plugin_languages_sections: most-used
          config_timezone: Africa/Casablanca
          extras_css: |
            :root {
              --color-text: #1C1917;
              --color-link: #15803D;
              --color-border: #D6D3D1;
              --color-background: #F0EEE6;
              --color-background-overlay: #F0EEE6;
            }
